<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thay đổi thuộc tính của trang Web</title>

<script>
function CapNhat(){
    document.title = TieuDe.value;
    document.body.style.backgroundColor = MauNen.value;
    document.body.style.color = MauChu.value;

    // hiển thị trạng thái trong trang
    document.getElementById("TrangThaiHienThi").innerHTML = TrangThai.value;
}
</script>

</head>

<body>

<h2>Nhập vào các giá trị và nhấn nút Thay đổi</h2>

<input type="text" name="TieuDe" value="Tiêu đề mới"><br><br>

<input type="text" name="MauNen" value="Nhập màu (ví dụ green)"><br><br>

<input type="text" name="MauChu" value="Nhập màu (ví dụ green)"><br><br>

<input type="text" name="TrangThai" value="Nhập trạng thái"><br><br>

<input type="button" value="Thay đổi" onclick="CapNhat()">


<h3 id="TrangThaiHienThi"></h3>

</body>
</html>
