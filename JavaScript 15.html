<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bài tập JavaScript 15</title>

<script>
function tinhTong(){
    var a = parseFloat(document.getElementById("SoHang1").value);
    var b = parseFloat(document.getElementById("SoHang2").value);

    var tong = a + b;

    document.getElementById("KetQua").value = tong;
}
</script>

</head>

<body>

<h2>Hãy nhập hai số và click vào nút Tính tổng</h2>

<input type="text" id="SoHang1"> +
<input type="text" id="SoHang2"> =
<input type="text" id="KetQua">

<br><br>

<input type="button" value="Tính tổng" onclick="tinhTong()">

</body>
</html>
